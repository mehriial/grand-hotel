<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <title>Grand Hotel | Sign Up</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <main>
        <section class="section__container">

            <div class="back__navigate">
                <i class="fa-solid fa-arrow-left"></i>
            </div>

            <div class="auth__header">
                <h3>Create Account</h3>
                <p>Lorem ipsum dolor sit amet consectetur.</p>
            </div>

            <form>

                <div class="input__container">
                    <label for="name" class="input__label">Full name</label>
                    <input type="name" name="name" id="name" placeholder="Enter your name">
                </div>

                <div class="input__container">
                    <label for="email" class="input__label">Email address</label>
                    <input type="email" name="email" id="email" placeholder="Enter your email">
                </div>

                <div class="input__container">
                    <label class="input__label" for="password">Password</label>
                    <div class="password__box">
                        <input type="password" id="password" placeholder="Enter your password" name="password">
                        <i class="fa-solid fa-eye eye-icon" id="eye-icon"></i>
                        <i class="fa-solid fa-eye-slash eye-slash-icon"></i>
                    </div>
                </div>
            </form>

            <button class="primary__button" id="signup__btn">Sign Up</button>

            <div class="divider text-center">
                Or Sign In with
            </div>

            <div class="social__login text-center">
                <button>
                    <img src="./assets/icons/google-icon.svg" alt="google-icon">
                </button>
                <button>
                    <img src="./assets/icons/apple-icon.svg" alt="apple-icon">
                </button>
                <button>
                    <img src="./assets/icons/facebook-icon.svg" alt="facebook-icon">
                </button>
            </div>

            <div class="terms text-center font-plus-jakarta">
                By signing up you agree to our <a href="#" class="terms__navigation">Terms</a>
                <br>
                and <a href="#" class="terms__navigation">Conditions of Use</a>
            </div>

        </section>
    </main>






    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./js/index.js"></script>
</body>

</html>
