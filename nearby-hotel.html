<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Grand Hotel | Nearby Hotel</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="map__page">
        <div class="top__bar">
            <button class="circle__btn">
                <i class="bi bi-arrow-left"></i>
            </button>

            <h1>Nearby Hotel</h1>

            <button class="circle__btn">
                <i class="bi bi-filter"></i>
            </button>
        </div>

        <div class="search__box">
            <i class="bi bi-search search__icon"></i>
            <input type="text" placeholder="Search...">
            <i class="bi bi-sliders filter__icon"></i>
        </div>

        <div class="map__marker marker-1">
            <img src="./assets/images/popular_1.png" alt="Hotel">
            <span>
                <i class="fa-solid fa-star"></i>
                4.0
            </span>
        </div>

        <div class="map__marker marker-2">
            <img src="./assets/images/popular_2.png" alt="Hotel">
            <span>
                <i class="fa-solid fa-star"></i>
                3.8
            </span>
        </div>

        <div class="map__marker marker-3">
            <img src="./assets/images/popular_3.png" alt="Hotel">
            <span>
                <i class="fa-solid fa-star"></i>
                4.5
            </span>
        </div>

        <div class="book__cards">
            <div class="book__card">
                <div class="rec__card">
                    <div class="rec__card__container">
                        <img src="./assets/images/rec-2.png" alt="villa">
                        <div class="rec__card__detail">
                            <h5>Elysian Suites</h5>
                            <p class="rec__card__location">
                                <i class="bi bi-geo-alt"></i>
                                San Diego, CA
                            </p>
                            <p class="rec__card__price__detail">
                                <span class="rec__card__price">$320</span>
                                /night
                            </p>
                        </div>
                    </div>
                    <span class="rec__card__rate">
                        <i class="fa-solid fa-star"></i>
                        3.8
                    </span>
                </div>
                <div class="actions">
                    <button class="primary__button">Booking now</button>
                    <button class="circle__btn">
                        <i class="bi bi-chat-text"></i>
                    </button>
                </div>
            </div>

            <div class="book__card">
                <div class="rec__card">
                    <div class="rec__card__container">
                        <img src="./assets/images/rec-1.png" alt="villa">
                        <div class="rec__card__detail">
                            <h5>Serenity Sands</h5>
                            <p class="rec__card__location">
                                <i class="bi bi-geo-alt"></i>
                                Honolulu, HI
                            </p>
                            <p class="rec__card__price__detail">
                                <span class="rec__card__price">$270</span>
                                /night
                            </p>
                        </div>
                    </div>
                    <span class="rec__card__rate">
                        <i class="fa-solid fa-star"></i>
                        4.0
                    </span>
                </div>
                <div class="actions">
                    <button class="primary__button">Booking now</button>
                    <button class="circle__btn">
                        <i class="bi bi-chat-text"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
