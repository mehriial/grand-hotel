<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <title>Grand Hotel | OTP</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <main>
        <section class="section__container">

            <span class="back__navigate">
                <i class="fa-solid fa-arrow-left"></i>
            </span>

            <div class="auth__header">
                <h3>Enter OTP</h3>
                <p>We have just sent you 4 digit code via your email.</p>
            </div>

            <form>
                <div class="otp__container">
                    <input class="otp__input" type="number" maxlength="1" min="0" max="9">
                    <input class="otp__input" type="number" maxlength="1" min="0" max="9">
                    <input class="otp__input" type="number" maxlength="1" min="0" max="9">
                    <input class="otp__input" type="number" maxlength="1" min="0" max="9">
                </div>
            </form>

            <button class="primary__button" id="otp__c__btn">Continue</button>

            <div class="resend__code text-center">
                Didn’t receive code?
                <a href="#" class="resend__code__navigate">Resend Code</a>
            </div>


        </section>


        <div id="modal" class="modal__overlay">
            <div class="modal__box text-center">
                <p class="modal__desc">I agree to the Terms of Service and Conditions of Use including consent to
                    electronic communications and I affirm that the information provided is my own.</p>

                <div class="text-center modal__group__btn">
                    <button type="button" class="disagree__btn outline__button">Disagree</button>
                    <button type="button" class="agree__btn primary__button">Agree</button>
                </div>
            </div>
        </div>
    </main>





    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./js/index.js"></script>
</body>

</html>
