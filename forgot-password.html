<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <title>Grand Hotel | Forgot Password</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <main>
        <section class="section__container">

            <span class="back__navigate">
                <i class="fa-solid fa-arrow-left"></i>
            </span>

            <div class="auth__header">
                <h3>Forgot Password</h3>
                <p>Recover your account password</p>
            </div>

            <form>
                <div class="input__container">
                    <label for="email" class="input__label">Email address</label>
                    <input type="email" name="email" id="email" placeholder="Enter your email">
                </div>

            </form>

            <button class="primary__button" id="forgot__password__btn">Next</button>
        </section>
    </main>





    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./js/index.js"></script>
</body>

</html>
