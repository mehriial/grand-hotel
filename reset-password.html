<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <title>Grand Hotel | Reset Password</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <main>
        <section class="section__container">

            <div class="back__navigate">
                <i class="fa-solid fa-arrow-left"></i>
            </div>

            <div class="auth__header">
                <h3>Create a
                    New Password</h3>
                <p>Enter your new password</p>
            </div>

            <form>
                <div class="input__container">
                    <label class="input__label" for="new-password">New Password</label>
                    <div class="password__box">
                        <input type="password" id="new-password" placeholder="Enter your password" name="new-password">
                        <i class="fa-solid fa-eye eye-icon"></i>
                        <i class="fa-solid fa-eye-slash eye-slash-icon"></i>
                    </div>
                </div>

                <div class="input__container">
                    <label class="input__label" for="confirm-password">Confirm Password</label>
                    <div class="password__box">
                        <input type="password" id="confirm-password" placeholder="Enter your password"
                            name="confirm-password">
                        <i class="fa-solid fa-eye eye-icon"></i>
                        <i class="fa-solid fa-eye-slash eye-slash-icon"></i>
                    </div>
                </div>
            </form>

            <button class="primary__button" id="reset__password__btn">Next</button>
        </section>


        <div id="modal" class="modal__overlay">
            <div class="modal__box text-center">
                <div class="modal__icon__container text-center">
                    <div class="modal__icon success">
                        <i class="fa-solid fa-check"></i>
                    </div>
                </div>
                <h5 class="modal__title">Success</h5>
                <p class="modal__desc">Your password is succesfully created</p>

                <div class="text-center modal__group__btn">
                    <button type="button" class="primary__button">Continue</button>
                </div>
            </div>
        </div>
    </main>





    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./js/index.js"></script>
</body>

</html>
